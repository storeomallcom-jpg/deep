<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#07080f"/>
<title>B-Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  /* ═══════════════════════════════════════════════
     DESIGN TOKENS & BASE
  ═══════════════════════════════════════════════ */
  :root {
    --primary:        #6366f1;
    --primary-dark:   #4f46e5;
    --primary-glow:   rgba(99,102,241,.35);
    --primary-tint:   rgba(99,102,241,.12);
    --bg:             #07080f;
    --bg2:            #0d1117;
    --surface:        #141824;
    --surface2:       #1c2333;
    --surface3:       #232d40;
    --border:         rgba(255,255,255,.07);
    --border2:        rgba(255,255,255,.12);
    --text:           #f0f2f8;
    --text-sub:       #94a3b8;
    --text-muted:     #4b5563;
    --green:          #22c55e;
    --green-dim:      rgba(34,197,94,.15);
    --red:            #ef4444;
    --red-dim:        rgba(239,68,68,.12);
    --radius-bubble:  18px;
    --safe-bottom:    env(safe-area-inset-bottom, 0px);
    --safe-top:       env(safe-area-inset-top, 0px);
  }

  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: 'Cairo', 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
  }

  /* ── GRAIN OVERLAY ── */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    opacity: .018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
  }

  /* ═══════════════════════════════════════════════
     SCREENS MANAGER
  ═══════════════════════════════════════════════ */
  .screen { display: none; flex-direction: column; height: 100%; position: relative; z-index: 1; }
  .screen.active { display: flex; }

  /* ═══════════════════════════════════════════════
     LOADING SCREEN
  ═══════════════════════════════════════════════ */
  #loadingScreen {
    align-items: center; justify-content: center;
    background: var(--bg);
  }
  .loader-logo {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; margin-bottom: 1.5rem;
    box-shadow: 0 0 50px var(--primary-glow);
    animation: logoPulse 1.8s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%, 100% { box-shadow: 0 0 30px var(--primary-glow); transform: scale(1); }
    50%       { box-shadow: 0 0 60px var(--primary-glow); transform: scale(1.04); }
  }
  .loader-dots { display: flex; gap: 6px; }
  .loader-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--primary); opacity: .4;
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .loader-dot:nth-child(2) { animation-delay: .2s; }
  .loader-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes dotBounce { 0%,80%,100%{transform:scale(.7);opacity:.3} 40%{transform:scale(1);opacity:1} }

  /* ═══════════════════════════════════════════════
     ERROR SCREEN
  ═══════════════════════════════════════════════ */
  #errorScreen {
    align-items: center; justify-content: center; padding: 2rem; text-align: center;
    background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(239,68,68,.12) 0%, transparent 60%), var(--bg);
  }
  .error-emoji { font-size: 4rem; margin-bottom: 1rem; filter: drop-shadow(0 0 20px rgba(239,68,68,.3)); }

  /* ═══════════════════════════════════════════════
     WELCOME SCREEN
  ═══════════════════════════════════════════════ */
  #welcomeScreen {
    align-items: center; justify-content: center; padding: 2rem; text-align: center;
    overflow-y: auto;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, var(--primary-tint) 0%, transparent 70%),
      var(--bg);
  }

  .welcome-card {
    width: 100%; max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 28px;
    padding: 2.5rem 2rem;
    box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
    backdrop-filter: blur(12px);
  }

  .welcome-avatar-wrap {
    position: relative; width: 90px; height: 90px; margin: 0 auto 1.5rem;
  }
  .welcome-avatar {
    width: 90px; height: 90px; border-radius: 50%; overflow: hidden;
    border: 3px solid var(--primary);
    background: linear-gradient(135deg, var(--primary), #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem; font-weight: 700; color: #fff;
    box-shadow: 0 0 0 6px var(--primary-tint), 0 0 40px var(--primary-glow);
  }
  .welcome-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .online-badge {
    position: absolute; bottom: 4px; right: 4px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--green); border: 3px solid var(--surface);
    box-shadow: 0 0 10px var(--green-dim);
    animation: onlinePulse 2.5s ease-in-out infinite;
  }
  @keyframes onlinePulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.6); }
    50%      { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
  }

  .welcome-name {
    font-size: 1.45rem; font-weight: 800; color: var(--text);
    margin-bottom: .3rem; letter-spacing: -.01em;
  }
  .welcome-bio {
    font-size: .88rem; color: var(--text-sub);
    line-height: 1.65; margin-bottom: 1.25rem;
    max-width: 280px; margin-left: auto; margin-right: auto;
  }
  .online-label {
    display: inline-flex; align-items: center; gap: .4rem;
    font-size: .78rem; color: var(--green);
    background: var(--green-dim);
    border: 1px solid rgba(34,197,94,.2);
    padding: .25rem .75rem; border-radius: 999px;
    margin-bottom: 1.75rem;
  }
  .online-label::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); }

  .w-divider {
    display: flex; align-items: center; gap: .75rem;
    font-size: .75rem; color: var(--text-muted); margin-bottom: 1rem;
  }
  .w-divider::before, .w-divider::after { content:''; flex:1; height:1px; background:var(--border); }

  .w-input {
    width: 100%; padding: .8rem 1.1rem;
    border-radius: 14px; outline: none; margin-bottom: .85rem;
    background: var(--bg2);
    border: 1.5px solid var(--border2);
    color: var(--text); font-size: .95rem; font-family: 'Cairo', sans-serif;
    transition: border-color .2s, background .2s;
    text-align: right;
  }
  .w-input::placeholder { color: var(--text-muted); }
  .w-input:focus { border-color: var(--primary); background: var(--primary-tint); }

  .start-btn {
    width: 100%; padding: .9rem; border-radius: 14px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--primary), #a855f7);
    color: #fff; font-weight: 700; font-size: 1rem; font-family: 'Cairo', sans-serif;
    letter-spacing: .01em;
    transition: all .25s;
    box-shadow: 0 0 35px var(--primary-glow);
    position: relative; overflow: hidden;
  }
  .start-btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.18), transparent);
    opacity: 0; transition: opacity .2s;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 0 55px var(--primary-glow); }
  .start-btn:hover::after { opacity: 1; }
  .start-btn:active { transform: translateY(0); }
  .start-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

  .lang-row {
    display: flex; align-items: center; justify-content: center; gap: .5rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }
  .lang-chip {
    padding: .3rem .65rem; border-radius: 8px; font-size: .75rem; font-weight: 600;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-sub); cursor: pointer; transition: all .18s;
  }
  .lang-chip.active { background: var(--primary-tint); border-color: rgba(99,102,241,.4); color: #a5b4fc; }
  .lang-chip:hover:not(.active) { background: var(--surface3); color: var(--text); }

  /* ═══════════════════════════════════════════════
     CHAT SCREEN
  ═══════════════════════════════════════════════ */
  #chatScreen { background: var(--bg); }

  /* ── HEADER ── */
  .chat-header {
    display: flex; align-items: center; gap: .85rem;
    padding: .8rem 1rem;
    padding-top: calc(.8rem + var(--safe-top));
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative; z-index: 20;
    /* dynamic primary color via JS */
    box-shadow: 0 1px 0 var(--border), 0 4px 20px rgba(0,0,0,.3);
  }
  .chat-header-avatar {
    width: 42px; height: 42px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(135deg, var(--primary), #a855f7);
    border: 2px solid rgba(255,255,255,.15);
    position: relative;
  }
  .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .chat-header-avatar .av-online {
    position: absolute; bottom: 0; right: 0;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--green); border: 2px solid var(--surface);
  }
  .chat-header-info { flex: 1; min-width: 0; }
  .chat-header-name {
    font-weight: 700; font-size: .97rem; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chat-header-status {
    font-size: .73rem; color: var(--green);
    display: flex; align-items: center; gap: .3rem; margin-top: .1rem;
  }
  .chat-header-status.typing-status { color: var(--text-sub); }
  .chat-header-status::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
  }

  .header-lang-btn {
    background: rgba(255,255,255,.07); border: 1px solid var(--border2);
    color: var(--text-sub); border-radius: 8px; padding: .3rem .5rem;
    font-size: .72rem; cursor: pointer; outline: none; font-family: 'Cairo', sans-serif;
    transition: all .15s;
  }
  .header-lang-btn:hover { background: rgba(255,255,255,.12); color: var(--text); }

  /* ── STATUS BANNER ── */
  .status-banner {
    margin: .75rem 1rem; padding: .7rem 1rem; border-radius: 12px;
    font-size: .83rem; font-weight: 600; display: none;
    align-items: center; gap: .6rem; text-align: right;
  }
  .status-banner.active { display: flex; }
  .status-banner.error {
    background: var(--red-dim); border: 1px solid rgba(239,68,68,.25); color: #fca5a5;
  }
  .status-banner.info {
    background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.25); color: #a5b4fc;
  }

  /* ── MESSAGES AREA ── */
  .messages-area {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 1rem 1rem .5rem;
    display: flex; flex-direction: column; gap: .35rem;
    scroll-behavior: smooth;
    background:
      radial-gradient(ellipse 100% 40% at 50% 100%, rgba(99,102,241,.05) 0%, transparent 70%),
      var(--bg);
    /* Subtle dot pattern */
    background-image:
      radial-gradient(ellipse 100% 40% at 50% 100%, rgba(99,102,241,.05) 0%, transparent 70%),
      radial-gradient(rgba(255,255,255,.015) 1px, transparent 1px);
    background-size: 100% 100%, 28px 28px;
  }
  .messages-area::-webkit-scrollbar { width: 3px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }

  /* ── DATE DIVIDER ── */
  .date-divider {
    display: flex; align-items: center; gap: .75rem;
    font-size: .7rem; color: var(--text-muted); margin: .5rem 0;
    letter-spacing: .04em;
  }
  .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── GREETING CARD ── */
  .greeting-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px; padding: 1rem 1.25rem;
    text-align: center; font-size: .875rem; color: var(--text-sub);
    line-height: 1.65; margin-bottom: .5rem;
    box-shadow: 0 4px 20px rgba(0,0,0,.2);
  }
  .greeting-card .store-name-em {
    color: var(--primary); font-weight: 700;
  }

  /* ── MESSAGE BUBBLES ── */
  .msg-group { display: flex; flex-direction: column; gap: .15rem; }
  .msg-group + .msg-group { margin-top: .5rem; }

  .msg-row { display: flex; align-items: flex-end; gap: .45rem; }
  .msg-row.bot  { justify-content: flex-start; }
  .msg-row.user { justify-content: flex-end; }

  .msg-avatar-sm {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; font-weight: 700; overflow: hidden;
    background: linear-gradient(135deg, var(--primary), #a855f7);
    color: #fff;
    align-self: flex-end;
  }
  .msg-avatar-sm img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .msg-row.user .msg-avatar-sm { background: var(--surface3); color: var(--text-sub); }

  /* Avatar spacer for grouped messages */
  .msg-avatar-placeholder { width: 26px; flex-shrink: 0; }

  .bubble-wrap { display: flex; flex-direction: column; max-width: 74%; }
  .msg-row.user .bubble-wrap { align-items: flex-end; }
  .msg-row.bot  .bubble-wrap { align-items: flex-start; }

  .bubble {
    padding: .6rem .95rem .45rem;
    border-radius: var(--radius-bubble);
    font-size: .91rem; line-height: 1.6;
    word-break: break-word; white-space: pre-wrap;
    position: relative;
    animation: bubbleIn .22s cubic-bezier(.34,1.3,.64,1) both;
  }
  @keyframes bubbleIn {
    from { opacity: 0; transform: scale(.88) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .bubble.bot {
    background: var(--surface2);
    color: var(--text);
    border-bottom-right-radius: 6px;
    border-bottom-left-radius: var(--radius-bubble);
  }
  /* RTL: bot messages come from the right visually */
  [dir="rtl"] .bubble.bot {
    border-bottom-left-radius: 6px;
    border-bottom-right-radius: var(--radius-bubble);
  }

  .bubble.user {
    background: var(--primary);
    color: #fff;
    border-bottom-left-radius: 6px;
    border-bottom-right-radius: var(--radius-bubble);
  }
  [dir="rtl"] .bubble.user {
    border-bottom-right-radius: 6px;
    border-bottom-left-radius: var(--radius-bubble);
  }

  /* First/last in group radius adjustments */
  .bubble.first-in-group.bot  { border-top-right-radius: var(--radius-bubble); }
  .bubble.first-in-group.user { border-top-left-radius: var(--radius-bubble); }
  .bubble.last-in-group.bot   { border-bottom-right-radius: 6px; }
  .bubble.last-in-group.user  { border-bottom-left-radius: 6px; }

  .bubble-meta {
    display: flex; align-items: center; gap: .35rem;
    font-size: .62rem; margin-top: .25rem; opacity: .55;
  }
  .msg-row.user .bubble-meta { justify-content: flex-end; }
  .msg-row.bot  .bubble-meta { justify-content: flex-start; }
  .tick { font-size: .65rem; color: #93c5fd; }

  /* ── TYPING INDICATOR ── */
  .typing-row {
    display: flex; align-items: flex-end; gap: .45rem;
    animation: bubbleIn .22s ease both;
  }
  .typing-bubble {
    background: var(--surface2); border-radius: var(--radius-bubble);
    border-bottom-right-radius: 6px;
    padding: .7rem 1rem;
    display: flex; gap: 5px; align-items: center;
  }
  [dir="rtl"] .typing-bubble {
    border-bottom-right-radius: var(--radius-bubble);
    border-bottom-left-radius: 6px;
  }
  .t-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-muted);
    animation: typingBounce 1.3s ease-in-out infinite;
  }
  .t-dot:nth-child(2) { animation-delay: .2s; }
  .t-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: .4; }
    30%           { transform: translateY(-5px); opacity: 1; }
  }

  /* ── INPUT AREA ── */
  .input-area {
    padding: .65rem 1rem;
    padding-bottom: calc(.65rem + var(--safe-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: flex-end; gap: .6rem;
    flex-shrink: 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,.2);
  }
  .msg-input {
    flex: 1; padding: .75rem 1.1rem;
    border-radius: 22px; outline: none; resize: none;
    background: var(--surface3);
    border: 1.5px solid transparent;
    color: var(--text); font-size: .91rem; font-family: 'Cairo', sans-serif;
    line-height: 1.5; max-height: 130px; overflow-y: auto;
    transition: border-color .2s, background .2s;
    text-align: right;
    caret-color: var(--primary);
  }
  .msg-input::placeholder { color: var(--text-muted); }
  .msg-input:focus {
    border-color: var(--primary);
    background: rgba(255,255,255,.05);
  }
  .msg-input:disabled { opacity: .4; cursor: not-allowed; }

  .send-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer; flex-shrink: 0;
    background: linear-gradient(135deg, var(--primary), #a855f7);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; box-shadow: 0 4px 20px var(--primary-glow);
    flex-direction: column;
  }
  .send-btn svg { width: 20px; height: 20px; }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 28px var(--primary-glow); }
  .send-btn:active { transform: scale(.96); }
  .send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── SCROLL TO BOTTOM BTN ── */
  .scroll-btn {
    position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 999px; padding: .35rem 1rem; font-size: .78rem;
    color: var(--text-sub); cursor: pointer; display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
    transition: all .2s; z-index: 10; white-space: nowrap;
  }
  .scroll-btn:hover { background: var(--surface3); color: var(--text); }

  /* ── RTL INPUT ── */
  [dir="ltr"] .msg-input { text-align: left; }
  [dir="ltr"] .w-input   { text-align: left; }

  /* ── MOBILE ── */
  @media (max-width: 430px) {
    .bubble { font-size: .875rem; }
    .bubble-wrap { max-width: 82%; }
    .welcome-card { border-radius: 20px; padding: 2rem 1.5rem; }
  }

  /* ── ORDER CONFIRMATION CARD ──────────────────────── */
  .order-confirm-card {
    background:linear-gradient(135deg,rgba(15,23,42,.95),rgba(10,15,28,.98));
    border:1px solid rgba(99,102,241,.35);
    border-radius:20px;padding:1.25rem;margin:.75rem 0;
    box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(99,102,241,.1);
    animation:bubbleIn .3s ease both;
    max-width:90%;
  }
  .oc-header { display:flex;align-items:center;gap:.5rem;margin-bottom:1rem; }
  .oc-icon { font-size:1.2rem; }
  .oc-title { font-weight:700;color:#f1f5f9;flex:1; }
  .oc-id { font-size:.7rem;color:#475569;font-family:monospace; }
  .oc-details { display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem;padding:.75rem;background:rgba(255,255,255,.03);border-radius:12px; }
  .oc-row { display:flex;gap:.6rem;font-size:.85rem;color:#94a3b8; }
  .oc-row span:last-child { color:#e2e8f0; }
  .oc-items { border-top:1px solid rgba(255,255,255,.06);padding-top:.75rem;margin-bottom:.75rem; }
  .oc-item { display:flex;justify-content:space-between;font-size:.85rem;color:#94a3b8;padding:.25rem 0; }
  .oc-item span:last-child { color:#f1f5f9;font-weight:600; }
  .oc-total { display:flex;justify-content:space-between;align-items:center;padding:.75rem;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);border-radius:12px;margin-bottom:1rem; }
  .oc-total span { font-size:.85rem;color:#a5b4fc; }
  .oc-total strong { font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#f1f5f9; }

<script>
/* ============================================================
   B-CHAT — chat.html  v4  (Order-to-Cash Edition)
   New: saveOrderToSupabase(), sendResendEmail(),
        ORDER_STATE machine, payment link display
============================================================ */
const sb          = createSupabase();
let merchant      = null;
let customerName  = '';
let convId        = null;
let chatHistory   = [];
let isTyping      = false;
let isBotActive   = true;
let uiLang        = 'ar';
let atBottom      = true;

// ── ORDER STATE MACHINE ───────────────────────────────────────
// Tracks the AI's data-collection progress for an order
const ORDER_STATE = {
  idle:        'idle',        // no order in progress
  collecting:  'collecting',  // gathering name/phone/address
  confirming:  'confirming',  // showing summary, awaiting confirmation
  saved:       'saved',       // order written to DB
};
let orderState    = ORDER_STATE.idle;
let pendingOrder  = {          // data collected so far
  items:    [],
  name:     '',
  phone:    '',
  address:  '',
  total:    0,
  shipping: 0,
};

/* ── UI COPY (same as before) ───────────────────────────────── */
const UI = {
  ar: {
    dir:'rtl', online:'متصل · مساعد ذكي', typing:'جاري الكتابة...',
    placeholder:'اكتب رسالتك...', startBtn:'💬 ابدأ الدردشة', nameHint:'اسمك (اختياري)',
    divider:'اليوم', expired:'⚠️ نعتذر، انتهت مدة الاشتراك.',
    noBalance:'⚠️ انتهى الرصيد، يرجى تعبئة الحساب',

  fr: {

    divider:'Aujourd\'hui', expired:'⚠️ Abonnement expiré.', noBalance:'⚠️ Solde épuisé.',
    errorTitle:'Lien invalide', errorMsg:'Ce lien est invalide.',

  },

    divider:'Today', expired:'⚠️ Subscription expired.', noBalance:'⚠️ Message balance is zero.',

  },
  es: {
    dir:'ltr', online:'En línea · Asistente IA', typing:'Escribiendo...',
    placeholder:'Escribe un mensaje...', startBtn:'💬 Iniciar Chat', nameHint:'Tu nombre (opcional)',
    divider:'Hoy', expired:'⚠️ Suscripción expirada.', noBalance:'⚠️ Saldo agotado.',
    errorTitle:'Enlace inválido', errorMsg:'Este enlace no es válido.',

    errorTitle:'Ungültiger Link', errorMsg:'Dieser Link ist ungültig.',
    errNet:'Verbindungsfehler.', errApi:'Ein Fehler ist aufgetreten.',
    scrollBtn:'↓ Neue Nachrichten', orderSaved:'✅ Bestellung aufgegeben!',
    payBtn:'💳 Zahlung abschließen', orderConfirmTitle:'Bestellübersicht',
  },
};

/* ── LANGUAGE SWITCH ─────────────────────────────────────────── */
function switchUILang(lang) {
  if (!UI[lang]) lang = 'ar';
  uiLang = lang;
  localStorage.setItem('bchat_lang', lang);
  const c = UI[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir  = c.dir;
  document.querySelectorAll('[data-lang]').forEach(el =>
    el.classList.toggle('active', el.dataset.lang === lang));
  const chatSel = document.getElementById('chatLangSelect');
  if (chatSel) chatSel.value = lang;
  const ni = document.getElementById('customerNameInput');
  if (ni) ni.placeholder = c.nameHint;
  const mi = document.getElementById('msgInput');
  if (mi) { mi.placeholder = c.placeholder; mi.dir = lang==='ar'?'rtl':'ltr'; mi.style.textAlign = lang==='ar'?'right':'left'; }
  const startB = document.getElementById('startBtn');
  if (startB && !startB.disabled) startB.textContent = c.startBtn;
  const dd = document.getElementById('dateDivider');
  if (dd) dd.textContent = c.divider;
  const scrollB = document.getElementById('scrollBtn');
  if (scrollB) scrollB.textContent = c.scrollBtn;
  const st = document.getElementById('chatHeaderStatus');
  if (st && !st.classList.contains('typing-status')) st.textContent = c.online;
}

/* ── INIT ──────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', async () => {
  const savedLang = localStorage.getItem('bchat_lang') || 'ar';
  switchUILang(savedLang);
  ['welcomeLangSelect','chatLangSelect'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.value = savedLang; el.addEventListener('change', e => switchUILang(e.target.value)); }
  });
  const mid = new URLSearchParams(window.location.search).get('id');
  if (!mid) { showError(UI[uiLang].errorTitle, UI[uiLang].errorMsg); return; }
  await loadMerchant(mid);
});

/* ── LOAD MERCHANT ─────────────────────────────────────────────── */
async function loadMerchant(mid) {
  const { data, error } = await sb.from('profiles')
    .select('id,store_name,bot_name,logo_url,bio,products_info,custom_prompt,theme_color,sub_end_date,message_balance,structured_data,payment_link,resend_api_key,resend_from,notify_email')
    .eq('id', mid).single();
  if (error || !data) { showError(UI[uiLang].errorTitle, UI[uiLang].errorMsg); return; }
  merchant = data;
  applyThemeColor(merchant.theme_color || '#6366f1');
  document.title = `${merchant.store_name} · Chat`;
  populateWelcome();
  showScreen('welcomeScreen');
}

/* ── APPLY THEME COLOR ─────────────────────────────────────────── */
function applyThemeColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  const root = document.documentElement.style;
  root.setProperty('--primary', hex);
  root.setProperty('--primary-dark', shadeHex(hex,-20));
  root.setProperty('--primary-glow', `rgba(${r},${g},${b},.35)`);
  root.setProperty('--primary-tint', `rgba(${r},${g},${b},.12)`);
  root.setProperty('--primary-tint2', `rgba(${r},${g},${b},.06)`);
  const header = document.getElementById('chatHeader');
  if (header) header.style.borderTop = `3px solid ${hex}`;
}
function shadeHex(hex, amt) {
  let r = Math.min(255,Math.max(0,parseInt(hex.slice(1,3),16)+amt));
  let g = Math.min(255,Math.max(0,parseInt(hex.slice(3,5),16)+amt));
  let b = Math.min(255,Math.max(0,parseInt(hex.slice(5,7),16)+amt));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

/* ── POPULATE WELCOME ──────────────────────────────────────────── */
function populateWelcome() {
  const av = document.getElementById('welcomeAvatar');
  if (merchant.logo_url) { av.innerHTML = `<img src="${escHtml(merchant.logo_url)}" alt="Logo"/>`; }
  else { av.textContent = (merchant.store_name||'B')[0].toUpperCase(); }
  av.style.borderColor = merchant.theme_color || '#6366f1';
  av.style.boxShadow = '0 0 0 6px var(--primary-tint), 0 0 40px var(--primary-glow)';
  document.getElementById('welcomeName').textContent = merchant.store_name || 'المتجر';
  document.getElementById('welcomeBio').textContent  = merchant.bio || '';
}

/* ── START CHAT ────────────────────────────────────────────────── */
async function startChat() {
  const btn = document.getElementById('startBtn');
  btn.textContent = '...'; btn.disabled = true;
  customerName = document.getElementById('customerNameInput').value.trim() ||
    (uiLang==='ar' ? 'زبون' : uiLang==='fr' ? 'Client' : 'Customer');
  const av = document.getElementById('chatHeaderAvatar');
  if (merchant.logo_url) {
    document.getElementById('chatHeaderAvatarText').style.display = 'none';
    av.innerHTML = `<img src="${escHtml(merchant.logo_url)}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"/><div class="av-online"></div>`;
  } else { document.getElementById('chatHeaderAvatarText').textContent = (merchant.bot_name||'B')[0]; }
  document.getElementById('chatHeaderName').textContent = merchant.bot_name || merchant.store_name;
  document.getElementById('chatHeaderStatus').textContent = UI[uiLang].online;
  isBotActive = new Date(merchant.sub_end_date) > new Date() && (merchant.message_balance||0) > 0;
  if (!isBotActive) {
    const msg = new Date(merchant.sub_end_date) <= new Date() ? UI[uiLang].expired : UI[uiLang].noBalance;
    showBanner(msg, 'error');
    document.getElementById('msgInput').disabled = true;
    document.getElementById('sendBtn').disabled  = true;
  }
  const greetings = {
    ar: `مرحباً بك في <span class="store-name-em">${escHtml(merchant.store_name)}</span> 👋<br/>أنا <strong>${escHtml(merchant.bot_name||'المساعد')}</strong>، كيف يمكنني مساعدتك؟`,
    fr: `Bienvenue chez <span class="store-name-em">${escHtml(merchant.store_name)}</span> 👋<br/>Je suis <strong>${escHtml(merchant.bot_name||'votre assistant')}</strong>, comment puis-je vous aider?`,
    en: `Welcome to <span class="store-name-em">${escHtml(merchant.store_name)}</span> 👋<br/>I'm <strong>${escHtml(merchant.bot_name||'your assistant')}</strong>, how can I help you today?`,
    es: `Bienvenido/a a <span class="store-name-em">${escHtml(merchant.store_name)}</span> 👋`,
    de: `Willkommen bei <span class="store-name-em">${escHtml(merchant.store_name)}</span> 👋`,
  };
  document.getElementById('greetingCard').innerHTML = greetings[uiLang] || greetings['ar'];
  await createConversation();
  showScreen('chatScreen');
  btn.textContent = UI[uiLang].startBtn; btn.disabled = false;
  scrollBottom();
  if (isBotActive) setTimeout(() => document.getElementById('msgInput').focus(), 300);
}

/* ── CREATE CONVERSATION ───────────────────────────────────────── */
async function createConversation() {
  const { data, error } = await sb.from('conversations').insert({
    merchant_id:   merchant.id,
    customer_data: { name: customerName, lang: uiLang, started_at: new Date().toISOString() },
    chat_history:  [],
  }).select('id').single();
  if (!error && data) convId = data.id;
}

/* ── SEND MESSAGE ──────────────────────────────────────────────── */
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || isTyping || !isBotActive) return;
  input.value = ''; autoResize(input);
  appendBubble('user', text);
  chatHistory.push({ role:'user', content:text });
  setTyping(true);
  const reply = await callGroq();
  setTyping(false);
  appendBubble('bot', reply);
  chatHistory.push({ role:'assistant', content:reply });

  // Parse AI reply for ORDER_TRIGGER markers
  await handleOrderTrigger(reply, text);

  // Decrement balance via RPC
  const { error: rpcErr } = await sb.rpc('decrement_message_balance', { m_id: merchant.id });
  if (rpcErr) { merchant.message_balance = Math.max(0,(merchant.message_balance||1)-1); }
  else {
    const { data: fp } = await sb.from('profiles').select('message_balance').eq('id', merchant.id).single();
    if (fp) merchant.message_balance = fp.message_balance ?? 0;
  }

  // Save conversation (fire-and-forget)
  if (convId) {
    sb.from('conversations').update({
      chat_history:  chatHistory,
      customer_data: { name:customerName, lang:uiLang, last_active:new Date().toISOString() },
    }).eq('id', convId);
  }

  if (merchant.message_balance <= 0) {
    isBotActive = false;
    showBanner(UI[uiLang].noBalance, 'error');
    document.getElementById('msgInput').disabled = true;
    document.getElementById('sendBtn').disabled  = true;
  }
  scrollBottom();
  if (isBotActive) input.focus();
}

/* ── CALL GROQ ─────────────────────────────────────────────────── */
async function callGroq() {
  const messages = [{ role:'system', content: buildSystemPrompt() }, ...chatHistory.slice(-24)];
  try {
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${BCHAT_CONFIG.GROQ_API_KEY}` },
      body: JSON.stringify({ model:BCHAT_CONFIG.GROQ_MODEL, max_tokens:700, temperature:0.7, messages }),
    });
    if (!resp.ok) return UI[uiLang].errApi;
    const data = await resp.json();
    return cleanAIOutput(data.choices?.[0]?.message?.content || '') || UI[uiLang].errApi;
  } catch { return UI[uiLang].errNet; }
}

/* ── CLEAN AI OUTPUT ───────────────────────────────────────────── */
function cleanAIOutput(raw) {
  return (raw||'')    .replace(/<think[\s\S]*?<\/think>/gi, '')    .replace(/<thinking[\s\S]*?<\/thinking>/gi, '')    .replace(/<reflection[\s\S]*?<\/reflection>/gi, '')    .replace(/<reasoning[\s\S]*?<\/reasoning>/gi, '')    .replace(/<\/?think[^>]*>/gi, '')    .replace(/\n{3,}/g, '\n\n')    .trim();
}

/* ════════════════════════════════════════════════════════════
   ORDER-TO-CASH  SYSTEM
════════════════════════════════════════════════════════════ */

/* ── BUILD SYSTEM PROMPT (Closer Edition) ──────────────────── */
function buildSystemPrompt() {
  const sd       = merchant.structured_data || {};
  const bd       = sd.business_details      || {};
  const zones    = sd.shipping_zones        || [];
  const products = sd.products              || [];
  const toneMap  = { friendly:'ودود', professional:'احترافي', casual:'عفوي', energetic:'حيوي' };
  const toneDesc = toneMap[bd.tone_of_voice] || 'ودود';
  const langInst = {
    ar:'تحدث بالدارجة المغربية. إذا تكلم الزبون بلغة أخرى جاوبه بيها.',
    fr:'Réponds en français. Adapte-toi au client.',
    en:'Reply in English. Adapt to the customer.',
    es:'Responde en español.', de:'Antworte auf Deutsch.',
  };

  const parts = [
    `أنت ${escHtml(merchant.bot_name||'مساعد مبيعات')} ديال "${escHtml(merchant.store_name)}". أسلوبك: ${toneDesc}.`,
    \`,
    `## مهمتك الأساسية — SALES CLOSER`,
    `- أجب على أسئلة المنتجات بدقة`,
    `- اقنع الزبون بالشراء`,
    `- حين يقرر الزبون الطلب: اجمع الاسم ورقم الهاتف والعنوان`,
    `- بعد جمع المعلومات الثلاث: أرسل في ردك الجملة التالية بالضبط على سطر منفصل:`,
    `  [[ORDER_READY:الاسم|رقم_الهاتف|العنوان|اسم_المنتج:السعر,اسم_منتج2:سعر2]]`,
    `  مثال: [[ORDER_READY:أحمد|0661234567|طنجة شارع محمد5|روب حمراء:299,توصيل:30]]`,
    `- لا تذكر أبداً أن هناك رابط دفع قبل ما تجمع المعلومات`,
    `,
    `## اللغة`, langInst[uiLang]||langInst['ar'],
    `اسم الزبون: ${escHtml(customerName)}.`,
    `,
    `## قواعد صارمة`,
    `- لا تقل أنك AI أو Groq`,
    `- لا تخترع أسعاراً`,
    `- ردود قصيرة (2-3 جمل)`,
    `- لا تُظهر التفكير الداخلي`,
  ];

  if (bd.business_type||bd.main_city) {
    parts.push('\n## المتجر');
    if (bd.business_type) parts.push(`- نوع النشاط: ${bd.business_type}`);
    if (bd.main_city)     parts.push(`- المدينة: ${bd.main_city}`);
    if (merchant.bio)     parts.push(`- وصف: ${merchant.bio}`);
  }

  if (products.length) {
    parts.push('\n## كتالوج المنتجات');
    products.forEach(p => {
      let line = `- ${p.name}: ${p.price} درهم`;
      if (p.description) line += ` — ${p.description}`;
      parts.push(line);
    });
  } else if (merchant.products_info) {
    parts.push(`\n## المنتجات\n${merchant.products_info}`);
  }

  if (zones.length) {
    parts.push('\n## التوصيل');
    zones.forEach(z => parts.push(`- ${z.city}: ${z.price} درهم`));
  }

  if (merchant.custom_prompt) parts.push(`\n## تعليمات إضافية\n${merchant.custom_prompt}`);

  // Inject current order state context
  if (orderState !== ORDER_STATE.idle) {
    parts.push(`\n## حالة الطلب الحالية`);
    parts.push(`- الاسم: ${pendingOrder.name || 'لم يُجمع بعد'}`);
    parts.push(`- الهاتف: ${pendingOrder.phone || 'لم يُجمع بعد'}`);
    parts.push(`- العنوان: ${pendingOrder.address || 'لم يُجمع بعد'}`);
    if (!pendingOrder.name)    parts.push('- المطلوب: اسأل عن الاسم الكامل');
    else if (!pendingOrder.phone)   parts.push('- المطلوب: اسأل عن رقم الهاتف');
    else if (!pendingOrder.address) parts.push('- المطلوب: اسأل عن العنوان بالتفصيل');
    else parts.push('- جميع المعلومات مكتملة → أرسل ORDER_READY الآن');
  }

  return parts.join('\n');
}

/* ── HANDLE ORDER TRIGGER ──────────────────────────────────── */
async function handleOrderTrigger(replyText, userInput) {
  // Check for ORDER_READY marker in AI reply
  const orderMatch = replyText.match(/\[\[ORDER_READY:([^\]]+)\]\]/);
  if (orderMatch) {
    await processOrderReady(orderMatch[1]);
    return;
  }

  // Update order state machine based on conversation
  if (orderState === ORDER_STATE.idle) {
    // Detect purchase intent keywords
    const buyKeywords = ['بغيت','حاب','طلب','order','acheter','buy','bestellen','quiero','commander'];
    const hasBuyIntent = buyKeywords.some(k => (userInput+replyText).toLowerCase().includes(k));
    if (hasBuyIntent) {
      orderState = ORDER_STATE.collecting;
      // Extract items from conversation context
      const sd = merchant.structured_data || {};
      const products = sd.products || [];
      // Try to detect which products were mentioned
      products.forEach(p => {
        if ((userInput+replyText).toLowerCase().includes(p.name.toLowerCase())) {
          if (!pendingOrder.items.find(i => i.name === p.name)) {
            pendingOrder.items.push({ name:p.name, price:p.price, qty:1 });
          }
        }
      });
    }
  }
}

/* ── PROCESS ORDER_READY ────────────────────────────────────── */
async function processOrderReady(orderData) {
  // Parse: name|phone|address|item1:price1,item2:price2
  const parts = orderData.split('|');
  if (parts.length < 3) return;

  const name    = parts[0].trim();
  const phone   = parts[1].trim();
  const address = parts[2].trim();
  const itemsRaw = parts[3] || '';

  // Parse items
  const items = [];
  let subtotal = 0;
  itemsRaw.split(',').forEach(itemStr => {
    const colonIdx = itemStr.lastIndexOf(':');
    if (colonIdx === -1) return;
    const itemName  = itemStr.slice(0, colonIdx).trim();
    const itemPrice = parseFloat(itemStr.slice(colonIdx+1)) || 0;
    if (itemName) {
      items.push({ name:itemName, price:itemPrice, qty:1 });
      subtotal += itemPrice;
    }
  });

  // Find shipping from items (if last item is "توصيل" or "shipping")
  let shippingCost = 0;
  const shippingItem = items.find(i =>
    i.name.includes('توصيل') || i.name.toLowerCase().includes('shipping') || i.name.toLowerCase().includes('livraison')
  );
  if (shippingItem) shippingCost = shippingItem.price;

  pendingOrder = { name, phone, address, items, subtotal, shipping: shippingCost, total: subtotal };

  // Save to Supabase
  const order = await saveOrderToSupabase({ name, phone, address, items, subtotal, shippingCost, total: subtotal });
  if (order) {
    orderState = ORDER_STATE.saved;
    showOrderConfirmation(order);
    // Send email notification
    await sendResendEmail(order);
  }
}

/* ── SAVE ORDER TO SUPABASE ────────────────────────────────── */
async function saveOrderToSupabase({ name, phone, address, items, subtotal, shippingCost, total }) {
  const { data, error } = await sb.from('orders').insert({
    merchant_id:      merchant.id,
    conversation_id:  convId,
    customer_name:    name,
    customer_phone:   phone,
    customer_address: address,
    items:            items,
    subtotal:         subtotal,
    shipping_cost:    shippingCost || 0,
    total_price:      total,
    currency:         'MAD',
    status:           'pending',
  }).select().single();

  if (error) {
    console.error('[B-Chat] Order save failed:', error.message);
    return null;
  }
  console.info('[B-Chat] Order saved:', data.id);
  return data;
}

/* ── TYPING STATE ──────────────────────────────────────────── */
let typingEl = null;
function setTyping(state) {
  isTyping = state;
  document.getElementById('sendBtn').disabled = state;
  const statusEl = document.getElementById('chatHeaderStatus');
  if (state) {
    const area = document.getElementById('messagesArea');
    typingEl = document.createElement('div');
    typingEl.className = 'typing-row'; typingEl.id = 'typingIndicator';
    const av = createAvatarEl('bot');
    const tb = document.createElement('div'); tb.className = 'typing-bubble';
    tb.innerHTML = '<div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>';
    typingEl.appendChild(av); typingEl.appendChild(tb);
    area.appendChild(typingEl);
    statusEl.textContent = UI[uiLang].typing; statusEl.classList.add('typing-status');
    scrollBottom();
  } else {
    document.getElementById('typingIndicator')?.remove(); typingEl = null;
    statusEl.textContent = UI[uiLang].online; statusEl.classList.remove('typing-status');
  }
}

/* ── APPEND BUBBLE ─────────────────────────────────────────── */
function appendBubble(role, text) {
  // Strip ORDER_READY marker from displayed text
  const displayText = text.replace(/\[\[ORDER_READY:[^\]]*\]\]/g, '').trim();
  if (!displayText) return;
  const area = document.getElementById('messagesArea');
  const row = document.createElement('div'); row.className = 'msg-group';
  const msgRow = document.createElement('div'); msgRow.className = `msg-row ${role}`;
  const av = createAvatarEl(role);
  const wrapDiv = document.createElement('div'); wrapDiv.className = 'bubble-wrap';
  const bubble = document.createElement('div'); bubble.className = `bubble ${role} first-in-group last-in-group`;
  bubble.innerHTML = escHtml(displayText).replace(/\n/g, '<br/>');
  const meta = document.createElement('div'); meta.className = 'bubble-meta';
  const timeStr = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  meta.innerHTML = `<span>${timeStr}</span>${role==='user'?'<span class="tick">✓✓</span>':''} `;
  wrapDiv.appendChild(bubble); wrapDiv.appendChild(meta);
  if (role==='bot') { msgRow.appendChild(av); msgRow.appendChild(wrapDiv); }
  else               { msgRow.appendChild(wrapDiv); msgRow.appendChild(av); }
  row.appendChild(msgRow); area.appendChild(row);
  if (atBottom) scrollBottom(); else showScrollBtn();
}

/* ── CREATE AVATAR ELEMENT ────────────────────────────────── */
function createAvatarEl(role) {
  const av = document.createElement('div'); av.className = 'msg-avatar-sm';
  if (role==='bot') {
    if (merchant.logo_url) av.innerHTML = `<img src="${escHtml(merchant.logo_url)}" alt=""/>`;
    else av.textContent = (merchant.bot_name||'B')[0].toUpperCase();
    av.style.background = `linear-gradient(135deg,${merchant.theme_color||'#6366f1'},#a855f7)`;
  } else {
    av.textContent = customerName[0]?.toUpperCase()||'Z';
    av.style.background = 'var(--surface3)'; av.style.color = 'var(--text-sub)';
  }
  return av;
}

/* ── SCROLL / SCREEN / BANNER HELPERS ─────────────────────── */
function scrollBottom() {
  const area = document.getElementById('messagesArea');
  requestAnimationFrame(() => { area.scrollTop = area.scrollHeight; atBottom = true; document.getElementById('scrollBtn').style.display = 'none'; });
}
function handleScroll() {
  const area = document.getElementById('messagesArea');
  atBottom = area.scrollHeight - area.clientHeight - area.scrollTop < 60;
  if (atBottom) document.getElementById('scrollBtn').style.display = 'none';
}
function showScrollBtn() { document.getElementById('scrollBtn').style.display = 'block'; }
function showBanner(msg, type='info') {
  const el = document.getElementById('statusBanner'); el.textContent = msg;
  el.className = `status-banner active ${type}`;
}
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function showError(title, msg) { document.getElementById('errorTitle').textContent = title||'Error'; document.getElementById('errorMsg').textContent = msg||'Invalid link.'; showScreen('errorScreen'); }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight,130)+'px'; }
function handleKeyDown(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); } }
function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
window.visualViewport?.addEventListener('resize', () => {
  if (document.getElementById('chatScreen').classList.contains('active')) scrollBottom();
});
