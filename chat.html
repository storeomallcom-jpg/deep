<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>B-Chat · Instant Sales</title>
  <!-- Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- config.js must define: SUPABASE_URL, SUPABASE_ANON_KEY, GROQ_API_KEY, GROQ_MODEL -->
  <script src="config.js"></script>
  <!-- Font & base styles (custom, WhatsApp‑style) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --primary: #25D366;      /* fallback green – will be overridden by merchant theme */
      --primary-light: rgba(37, 211, 102, 0.12);
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #2d3a4f;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --chat-bg: #0b101f;
      --bubble-bot: #1e293b;
      --bubble-user: var(--primary);
      --online-green: #6ee7b7;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--chat-bg);
      color: var(--text);
    }

    /* screens */
    .screen {
      display: none;
      flex-direction: column;
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    .screen.active {
      display: flex;
    }

    /* ---------- WELCOME SCREEN ---------- */
    #welcomeScreen {
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(99,102,241,0.2) 0%, transparent 70%), var(--chat-bg);
      text-align: center;
    }
    .welcome-logo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--primary);
      margin: 0 auto 1.25rem;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 600;
      color: white;
      box-shadow: 0 10px 35px rgba(0,0,0,0.3);
    }
    .welcome-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .welcome-name {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.3rem;
    }
    .welcome-bio {
      font-size: 0.95rem;
      color: var(--text-muted);
      max-width: 340px;
      margin: 0 auto 0.5rem;
      line-height: 1.6;
      white-space: pre-line;
    }
    .online-dot {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--online-green);
      background: rgba(110,231,183,0.1);
      padding: 0.3rem 1rem;
      border-radius: 30px;
    }
    .online-dot::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--online-green);
    }
    .welcome-form {
      width: 100%;
      max-width: 360px;
      margin: 2rem auto 0;
    }
    .w-input {
      width: 100%;
      padding: 0.9rem 1.2rem;
      border-radius: 40px;
      outline: none;
      margin-bottom: 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      transition: all 0.2s;
    }
    .w-input:focus {
      border-color: var(--primary);
      background: rgba(99,102,241,0.1);
    }
    .start-btn {
      width: 100%;
      padding: 1rem;
      border-radius: 40px;
      border: none;
      cursor: pointer;
      background: var(--primary);
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      font-family: inherit;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }
    .start-btn:active { transform: scale(0.97); }
    .start-btn:disabled { opacity: 0.5; pointer-events: none; }

    /* ---------- CHAT SCREEN ---------- */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      background: linear-gradient(145deg, var(--primary), #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      color: white;
      border: 2px solid rgba(255,255,255,0.15);
    }
    .chat-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .chat-meta {
      flex: 1;
      min-width: 0;
    }
    .chat-name {
      font-weight: 700;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-status {
      font-size: 0.75rem;
      color: var(--online-green);
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .chat-status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .lang-mini {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 0.25rem 0.6rem;
      font-size: 0.7rem;
      cursor: pointer;
      outline: none;
    }

    .status-banner {
      margin: 0.75rem 1rem;
      padding: 0.8rem 1rem;
      border-radius: 14px;
      font-size: 0.9rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fecaca;
    }
    .status-banner.show { display: flex; }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      background: var(--chat-bg);
      scroll-behavior: smooth;
    }

    /* message rows */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-row.bot { justify-content: flex-start; }
    .msg-row.user { justify-content: flex-end; }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 600;
      overflow: hidden;
      background: var(--surface);
      color: white;
    }
    .msg-avatar.bot-av { background: linear-gradient(145deg, var(--primary), #a855f7); }
    .msg-avatar.user-av { background: #334155; }

    .bubble {
      max-width: 75%;
      padding: 0.6rem 1rem;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .bubble.bot {
      background: var(--bubble-bot);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .bubble.user {
      background: var(--bubble-user);
      border-bottom-right-radius: 4px;
      color: white;
    }
    .bubble .time {
      display: block;
      font-size: 0.65rem;
      opacity: 0.6;
      margin-top: 0.25rem;
      text-align: right;
    }

    /* typing indicator */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
    }
    .typing-bubble {
      background: var(--bubble-bot);
      border-radius: 20px;
      border-bottom-left-radius: 4px;
      padding: 0.7rem 1.2rem;
      display: flex;
      gap: 0.3rem;
    }
    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing 1.2s infinite ease;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%,60%,100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* date divider */
    .date-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      padding: 0.75rem 0;
    }
    .date-divider::before,
    .date-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .greeting-bubble {
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 18px;
      padding: 1rem;
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    /* input area */
    .input-area {
      padding: 0.7rem 1rem;
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 0.6rem;
      flex-shrink: 0;
    }
    .msg-input {
      flex: 1;
      padding: 0.7rem 1rem;
      border-radius: 26px;
      outline: none;
      resize: none;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      line-height: 1.4;
      max-height: 110px;
      transition: border 0.15s;
    }
    .msg-input:focus {
      border-color: var(--primary);
      background: rgba(99,102,241,0.08);
    }
    .send-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.15s;
      flex-shrink: 0;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { opacity: 0.4; pointer-events: none; }

    /* error screen */
    #errorScreen {
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .error-icon { font-size: 4rem; margin-bottom: 1rem; }

    /* RTL overrides */
    html[dir="rtl"] .msg-row.bot { justify-content: flex-end; }
    html[dir="rtl"] .msg-row.user { justify-content: flex-start; }
    html[dir="rtl"] .bubble.bot { border-bottom-left-radius: 18px; border-bottom-right-radius: 4px; }
    html[dir="rtl"] .bubble.user { border-bottom-right-radius: 18px; border-bottom-left-radius: 4px; }
    html[dir="rtl"] .typing-bubble { border-bottom-left-radius: 18px; border-bottom-right-radius: 4px; }
    html[dir="rtl"] .chat-header { flex-direction: row-reverse; }
    html[dir="rtl"] .input-area { flex-direction: row-reverse; }
    html[dir="rtl"] .msg-avatar { margin-left: 0; margin-right: 0; }

    /* scrollbar */
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
  </style>
</head>
<body>

<!-- ERROR SCREEN -->
<div class="screen" id="errorScreen">
  <div class="error-icon">😕</div>
  <h2 style="color: #f1f5f9; margin-bottom: 0.5rem;">Bot not available</h2>
  <p style="color: var(--text-muted);" id="errorMsg">Invalid or expired link</p>
</div>

<!-- WELCOME SCREEN -->
<div class="screen" id="welcomeScreen">
  <div class="welcome-logo" id="welcomeLogo">🤖</div>
  <h1 class="welcome-name" id="welcomeName">Loading...</h1>
  <p class="welcome-bio" id="welcomeBio"></p>
  <div class="online-dot">Online · Ready</div>
  <div class="welcome-form">
    <input class="w-input" type="text" id="customerName" placeholder="Your name (optional)" maxlength="50">
    <button class="start-btn" id="startBtn" onclick="startChat()">Start chatting</button>
  </div>
  <div style="margin-top: 2rem;">
    <select class="lang-mini" id="welcomeLangSelect" onchange="setLang(this.value)">
      <option value="en">🇬🇧 EN</option>
      <option value="ar">🇸🇦 AR</option>
      <option value="fr">🇫🇷 FR</option>
      <option value="es">🇪🇸 ES</option>
    </select>
  </div>
</div>

<!-- CHAT SCREEN -->
<div class="screen" id="chatScreen">
  <div class="chat-header">
    <div class="chat-avatar" id="chatAvatar">🤖</div>
    <div class="chat-meta">
      <div class="chat-name" id="chatBotName">B-Chat</div>
      <div class="chat-status" id="chatStatus">Online</div>
    </div>
    <div class="chat-header-actions">
      <select class="lang-mini" id="chatLangSelect" onchange="setLang(this.value)">
        <option value="en">EN</option>
        <option value="ar">AR</option>
        <option value="fr">FR</option>
        <option value="es">ES</option>
      </select>
    </div>
  </div>

  <div class="status-banner" id="statusBanner"></div>

  <div class="messages-area" id="messagesArea">
    <div class="date-divider">اليوم</div>
    <div class="greeting-bubble" id="greetingBubble"></div>
  </div>

  <div class="input-area">
    <textarea class="msg-input" id="msgInput" rows="1" placeholder="Type a message..." onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  // ---------- CONFIG (from config.js) ----------
  // Expecting global variables: SUPABASE_URL, SUPABASE_ANON_KEY, GROQ_API_KEY, GROQ_MODEL
  // Fallback for demo (will be overridden by config.js)
  window.SUPABASE_URL = window.SUPABASE_URL || 'https://your-project.supabase.co';
  window.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || 'your-anon-key';
  window.GROQ_API_KEY = window.GROQ_API_KEY || 'gsk_...';
  window.GROQ_MODEL = window.GROQ_MODEL || 'llama3-70b-8192';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ---------- GLOBAL STATE ----------
  let merchant = null;
  let customerName = '';
  let convId = null;
  let chatHistory = [];             // { role, content }
  let isTyping = false;
  let isBotActive = true;
  let typingElement = null;

  // ---------- I18N & RTL ----------
  const translations = {
    en: {
      your_name: 'Your name (optional)',
      start_chat: 'Start chatting',
      type_message: 'Type a message...',
      online: 'Online',
      today: 'Today',
      no_messages: 'This store has reached its message limit.',
      trial_expired: 'Service expired.',
      thinking: 'typing...',
      greeting: '👋 Hi! How can I help you today?',
      bot_not_available: 'Sorry, the store is not available right now.',
    },
    ar: {
      your_name: 'الاسم (اختياري)',
      start_chat: 'بدء المحادثة',
      type_message: 'اكتب رسالة...',
      online: 'متصل',
      today: 'اليوم',
      no_messages: 'نعتذر، المتجر غير متاح حالياً.',
      trial_expired: 'انتهت صلاحية الخدمة.',
      thinking: 'جاري الكتابة...',
      greeting: '👋 مرحباً! كيف يمكنني مساعدتك؟',
      bot_not_available: 'نعتذر، المتجر غير متاح حالياً.',
    },
    fr: {
      your_name: 'Votre nom (optionnel)',
      start_chat: 'Démarrer',
      type_message: 'Écrivez...',
      online: 'En ligne',
      today: "Aujourd'hui",
      no_messages: 'Désolé, la boutique est indisponible.',
      trial_expired: 'Service expiré.',
      thinking: 'écriture...',
      greeting: '👋 Bonjour ! Comment puis-je vous aider ?',
      bot_not_available: 'Désolé, la boutique est indisponible.',
    },
    es: {
      your_name: 'Tu nombre (opcional)',
      start_chat: 'Iniciar chat',
      type_message: 'Escribe...',
      online: 'En línea',
      today: 'Hoy',
      no_messages: 'Lo sentimos, la tienda no está disponible.',
      trial_expired: 'Servicio expirado.',
      thinking: 'escribiendo...',
      greeting: '👋 ¡Hola! ¿Cómo puedo ayudarte?',
      bot_not_available: 'Lo sentimos, la tienda no está disponible.',
    },
  };

  function t(key) {
    const lang = getLang();
    return translations[lang]?.[key] || translations.en[key] || key;
  }

  function getLang() {
    return localStorage.getItem('bchat_lang') || 'en';
  }

  function setLang(lang) {
    localStorage.setItem('bchat_lang', lang);
    applyLang(lang);
  }

  function applyLang(lang) {
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

    // update UI texts (static placeholders)
    const nameInput = document.getElementById('customerName');
    if (nameInput) nameInput.placeholder = t('your_name');
    const msgInput = document.getElementById('msgInput');
    if (msgInput) msgInput.placeholder = t('type_message');
    const startBtn = document.getElementById('startBtn');
    if (startBtn) startBtn.innerText = t('start_chat');
    const greeting = document.getElementById('greetingBubble');
    if (greeting && merchant) {
      greeting.innerText = `👋 ${merchant.bot_name || merchant.store_name} ` + t('greeting').replace('👋 ','');
    }

    // sync selectors
    ['welcomeLangSelect', 'chatLangSelect'].forEach(id => {
      const sel = document.getElementById(id);
      if (sel) sel.value = lang;
    });

    // update status banner if any
    if (!isBotActive) {
      const banner = document.getElementById('statusBanner');
      if (merchant && new Date(merchant.sub_end_date) <= new Date()) {
        banner.innerText = '⚠️ ' + t('trial_expired');
      } else if (merchant && merchant.message_balance <= 0) {
        banner.innerText = '⚠️ ' + t('no_messages');
      }
    }
  }

  // ---------- UTILS ----------
  function stripThinkTags(text) {
    return text.replace(/<think>[\s\S]*?<\/think>/gi, '').trim();
  }

  function escHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 110) + 'px';
  }

  function scrollBottom() {
    requestAnimationFrame(() => {
      const area = document.getElementById('messagesArea');
      area.scrollTop = area.scrollHeight;
    });
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showError(msg) {
    document.getElementById('errorMsg').innerText = msg;
    showScreen('errorScreen');
  }

  // ---------- LOAD MERCHANT ----------
  async function loadMerchant(merchantId) {
    try {
      const { data, error } = await supabase
        .from('profiles')
        .select('id, store_name, bot_name, logo_url, bio, products_info, custom_prompt, theme_color, sub_end_date, message_balance')
        .eq('id', merchantId)
        .single();

      if (error || !data) {
        showError('Merchant not found.');
        return;
      }
      merchant = data;

      // apply theme color
      if (merchant.theme_color) {
        document.documentElement.style.setProperty('--primary', merchant.theme_color);
        document.documentElement.style.setProperty('--primary-light', hexToRgba(merchant.theme_color, 0.15));
      }

      // populate welcome
      document.getElementById('welcomeName').innerText = merchant.store_name || 'Store';
      document.getElementById('welcomeBio').innerText = merchant.bio || '';
      const logoDiv = document.getElementById('welcomeLogo');
      if (merchant.logo_url) {
        logoDiv.innerHTML = `<img src="${merchant.logo_url}" alt="logo">`;
      } else {
        logoDiv.innerText = (merchant.store_name?.[0] || 'S').toUpperCase();
      }

      // check initial availability
      const now = new Date();
      const subEnd = new Date(merchant.sub_end_date);
      if (subEnd <= now || merchant.message_balance <= 0) {
        isBotActive = false;
        // we'll show banner later if they proceed
      }

      showScreen('welcomeScreen');
    } catch (e) {
      showError('Failed to load store.');
    }
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // ---------- START CHAT ----------
  async function startChat() {
    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.innerText = '...';

    customerName = document.getElementById('customerName').value.trim() || 'Customer';

    // update chat header
    const chatAvatar = document.getElementById('chatAvatar');
    if (merchant.logo_url) {
      chatAvatar.innerHTML = `<img src="${merchant.logo_url}" alt="">`;
    } else {
      chatAvatar.innerText = (merchant.bot_name?.[0] || merchant.store_name?.[0] || 'B').toUpperCase();
    }
    document.getElementById('chatBotName').innerText = merchant.bot_name || merchant.store_name;
    document.getElementById('chatStatus').innerText = 'Online · AI';

    const now = new Date();
    const subOk = new Date(merchant.sub_end_date) > now;
    const balOk = (merchant.message_balance || 0) > 0;
    isBotActive = subOk && balOk;

    const banner = document.getElementById('statusBanner');
    if (!isBotActive) {
      banner.classList.add('show');
      if (!subOk) banner.innerText = '⚠️ ' + t('trial_expired');
      else if (!balOk) banner.innerText = '⚠️ ' + t('no_messages');
      document.getElementById('msgInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;
    } else {
      banner.classList.remove('show');
      document.getElementById('msgInput').disabled = false;
      document.getElementById('sendBtn').disabled = false;
    }

    // set greeting
    document.getElementById('greetingBubble').innerText = `👋 ${merchant.bot_name || merchant.store_name} ` + t('greeting').replace('👋 ','');

    // create conversation record
    const { data, error } = await supabase.from('conversations').insert({
      merchant_id: merchant.id,
      customer_data: { name: customerName, started_at: new Date().toISOString() },
      chat_history: [],
    }).select('id').single();

    if (!error && data) convId = data.id;

    showScreen('chatScreen');
    scrollBottom();
    if (isBotActive) document.getElementById('msgInput').focus();
    btn.disabled = false;
    btn.innerText = t('start_chat');
  }

  // ---------- SEND MESSAGE ----------
  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || isTyping || !isBotActive) return;

    input.value = '';
    autoResize(input);

    // user bubble
    appendBubble('user', text);
    chatHistory.push({ role: 'user', content: text });

    // typing
    showTyping();
    isTyping = true;
    document.getElementById('sendBtn').disabled = true;

    // call AI
    const replyRaw = await callGroq(text);
    const cleanReply = stripThinkTags(replyRaw);

    hideTyping();
    isTyping = false;
    document.getElementById('sendBtn').disabled = false;

    appendBubble('bot', cleanReply);
    chatHistory.push({ role: 'assistant', content: cleanReply });

    // decrement message balance
    merchant.message_balance = Math.max(0, (merchant.message_balance || 1) - 1);
    await supabase.from('profiles').update({ message_balance: merchant.message_balance }).eq('id', merchant.id);

    // update conversation in db
    if (convId) {
      await supabase.from('conversations').update({
        chat_history: chatHistory,
        customer_data: { name: customerName, last_active: new Date().toISOString() }
      }).eq('id', convId);
    }

    // if balance hits zero, disable
    if (merchant.message_balance <= 0) {
      isBotActive = false;
      document.getElementById('statusBanner').innerText = '⚠️ ' + t('no_messages');
      document.getElementById('statusBanner').classList.add('show');
      document.getElementById('msgInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;
    }

    scrollBottom();
    input.focus();
  }

  // ---------- GROQ CALL ----------
  async function callGroq(userMessage) {
    const systemPrompt = buildSystemPrompt();

    const context = chatHistory.slice(-15);  // keep recent

    const payload = {
      model: GROQ_MODEL,
      messages: [
        { role: 'system', content: systemPrompt },
        ...context,
        { role: 'user', content: userMessage }
      ],
      temperature: 0.6,
      max_tokens: 450,
    };

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${GROQ_API_KEY}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`Groq error ${res.status}`);
      const data = await res.json();
      return data.choices[0]?.message?.content || '...';
    } catch (e) {
      console.error(e);
      return t('bot_not_available');
    }
  }

  function buildSystemPrompt() {
    const lang = getLang();
    const base = `You are a sales assistant for "${merchant.store_name}". 
Your name is ${merchant.bot_name || 'Assistant'}.
Always respond in Moroccan Darija (الدارجة المغربية). Be concise, friendly, and persuasive. Do not show any internal thinking or meta comments. Keep replies under 4 sentences unless complex.
Customer name: ${customerName}.
`;
    const knowledge = [];
    if (merchant.bio) knowledge.push(`Store bio: ${merchant.bio}`);
    if (merchant.products_info) knowledge.push(`Products info: ${merchant.products_info}`);
    if (merchant.custom_prompt) knowledge.push(`Extra instructions: ${merchant.custom_prompt}`);

    return base + '\n' + knowledge.join('\n');
  }

  // ---------- UI MESSAGE HELPERS ----------
  function appendBubble(role, text) {
    const area = document.getElementById('messagesArea');
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `msg-avatar ${role === 'bot' ? 'bot-av' : 'user-av'}`;
    if (role === 'bot') {
      if (merchant.logo_url) {
        avatar.innerHTML = `<img src="${merchant.logo_url}" alt="">`;
      } else {
        avatar.innerText = (merchant.bot_name?.[0] || 'B').toUpperCase();
      }
    } else {
      avatar.innerText = customerName[0]?.toUpperCase() || 'U';
    }

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    const now = new Date();
    const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    bubble.innerHTML = escHtml(text).replace(/\n/g, '<br>') + `<span class="time">${timeStr}</span>`;

    if (role === 'bot') {
      row.appendChild(avatar);
      row.appendChild(bubble);
    } else {
      row.appendChild(bubble);
      row.appendChild(avatar);
    }
    area.appendChild(row);
    scrollBottom();
  }

  function showTyping() {
    const area = document.getElementById('messagesArea');
    typingElement = document.createElement('div');
    typingElement.className = 'typing-row';
    const av = document.createElement('div');
    av.className = 'msg-avatar bot-av';
    if (merchant.logo_url) {
      av.innerHTML = `<img src="${merchant.logo_url}" alt="">`;
    } else {
      av.innerText = (merchant.bot_name?.[0] || 'B').toUpperCase();
    }
    const tb = document.createElement('div');
    tb.className = 'typing-bubble';
    tb.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    typingElement.appendChild(av);
    typingElement.appendChild(tb);
    area.appendChild(typingElement);
    document.getElementById('chatStatus').innerHTML = t('thinking');
    scrollBottom();
  }

  function hideTyping() {
    if (typingElement) {
      typingElement.remove();
      typingElement = null;
    }
    document.getElementById('chatStatus').innerHTML = 'Online · AI';
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ---------- INIT ----------
  window.addEventListener('DOMContentLoaded', async () => {
    // apply saved language
    const savedLang = getLang();
    applyLang(savedLang);

    const urlParams = new URLSearchParams(window.location.search);
    const mid = urlParams.get('id');
    if (!mid) {
      showError('No store ID provided.');
      return;
    }

    await loadMerchant(mid);
  });

  // adjust scroll on keyboard open (mobile)
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      if (document.getElementById('chatScreen').classList.contains('active')) {
        scrollBottom();
      }
    });
  }
</script>
</body>
</html>
