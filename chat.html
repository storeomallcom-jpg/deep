<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#07080f"/>
<title>B-Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  /* ═══════════════════════════════════════════════
     DESIGN TOKENS & BASE
  ═══════════════════════════════════════════════ */
  :root {
    --primary:        #6366f1;
    --primary-dark:   #4f46e5;
    --primary-glow:   rgba(99,102,241,.35);
    --primary-tint:   rgba(99,102,241,.12);
    --bg:             #07080f;
    --bg2:            #0d1117;
    --surface:        #141824;
    --surface2:       #1c2333;
    --surface3:       #232d40;
    --border:         rgba(255,255,255,.07);
    --border2:        rgba(255,255,255,.12);
    --text:           #f0f2f8;
    --text-sub:       #94a3b8;
    --text-muted:     #4b5563;
    --green:          #22c55e;
    --green-dim:      rgba(34,197,94,.15);
    --red:            #ef4444;
    --red-dim:        rgba(239,68,68,.12);
    --radius-bubble:  18px;
    --safe-bottom:    env(safe-area-inset-bottom, 0px);
    --safe-top:       env(safe-area-inset-top, 0px);
  }

  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: 'Cairo', 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
  }

  /* ── GRAIN OVERLAY ── */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    opacity: .018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 180px;
  }

  /* ═══════════════════════════════════════════════
     SCREENS MANAGER
  ═══════════════════════════════════════════════ */
  .screen { display: none; flex-direction: column; height: 100%; position: relative; z-index: 1; }
  .screen.active { display: flex; }

  /* ═══════════════════════════════════════════════
     LOADING SCREEN
  ═══════════════════════════════════════════════ */
  #loadingScreen {
    align-items: center; justify-content: center;
    background: var(--bg);
  }
  .loader-logo {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; margin-bottom: 1.5rem;
    box-shadow: 0 0 50px var(--primary-glow);
    animation: logoPulse 1.8s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%, 100% { box-shadow: 0 0 30px var(--primary-glow); transform: scale(1); }
    50%       { box-shadow: 0 0 60px var(--primary-glow); transform: scale(1.04); }
  }
  .loader-dots { display: flex; gap: 6px; }
  .loader-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--primary); opacity: .4;
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .loader-dot:nth-child(2) { animation-delay: .2s; }
  .loader-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes dotBounce { 0%,80%,100%{transform:scale(.7);opacity:.3} 40%{transform:scale(1);opacity:1} }

  /* ═══════════════════════════════════════════════
     ERROR SCREEN
  ═══════════════════════════════════════════════ */
  #errorScreen {
    align-items: center; justify-content: center; padding: 2rem; text-align: center;
    background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(239,68,68,.12) 0%, transparent 60%), var(--bg);
  }
  .error-emoji { font-size: 4rem; margin-bottom: 1rem; filter: drop-shadow(0 0 20px rgba(239,68,68,.3)); }

  /* ═══════════════════════════════════════════════
     WELCOME SCREEN
  ═══════════════════════════════════════════════ */
  #welcomeScreen {
    align-items: center; justify-content: center; padding: 2rem; text-align: center;
    overflow-y: auto;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, var(--primary-tint) 0%, transparent 70%),
      var(--bg);
  }

  .welcome-card {
    width: 100%; max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 28px;
    padding: 2.5rem 2rem;
    box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
    backdrop-filter: blur(12px);
  }

  .welcome-avatar-wrap {
    position: relative; width: 90px; height: 90px; margin: 0 auto 1.5rem;
  }
  .welcome-avatar {
    width: 90px; height: 90px; border-radius: 50%; overflow: hidden;
    border: 3px solid var(--primary);
    background: linear-gradient(135deg, var(--primary), #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem; font-weight: 700; color: #fff;
    box-shadow: 0 0 0 6px var(--primary-tint), 0 0 40px var(--primary-glow);
  }
  .welcome-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .online-badge {
    position: absolute; bottom: 4px; right: 4px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--green); border: 3px solid var(--surface);
    box-shadow: 0 0 10px var(--green-dim);
    animation: onlinePulse 2.5s ease-in-out infinite;
  }
  @keyframes onlinePulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.6); }
    50%      { box-shadow: 0 0 0 5px rgba(34,197,94,0); }
  }

  .welcome-name {
    font-size: 1.45rem; font-weight: 800; color: var(--text);
    margin-bottom: .3rem; letter-spacing: -.01em;
  }
  .welcome-bio {
    font-size: .88rem; color: var(--text-sub);
    line-height: 1.65; margin-bottom: 1.25rem;
    max-width: 280px; margin-left: auto; margin-right: auto;
  }
  .online-label {
    display: inline-flex; align-items: center; gap: .4rem;
    font-size: .78rem; color: var(--green);
    background: var(--green-dim);
    border: 1px solid rgba(34,197,94,.2);
    padding: .25rem .75rem; border-radius: 999px;
    margin-bottom: 1.75rem;
  }
  .online-label::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); }

  .w-divider {
    display: flex; align-items: center; gap: .75rem;
    font-size: .75rem; color: var(--text-muted); margin-bottom: 1rem;
  }
  .w-divider::before, .w-divider::after { content:''; flex:1; height:1px; background:var(--border); }

  .w-input {
    width: 100%; padding: .8rem 1.1rem;
    border-radius: 14px; outline: none; margin-bottom: .85rem;
    background: var(--bg2);
    border: 1.5px solid var(--border2);
    color: var(--text); font-size: .95rem; font-family: 'Cairo', sans-serif;
    transition: border-color .2s, background .2s;
    text-align: right;
  }
  .w-input::placeholder { color: var(--text-muted); }
  .w-input:focus { border-color: var(--primary); background: var(--primary-tint); }

  .start-btn {
    width: 100%; padding: .9rem; border-radius: 14px; border: none; cursor: pointer;
    background: linear-gradient(135deg, var(--primary), #a855f7);
    color: #fff; font-weight: 700; font-size: 1rem; font-family: 'Cairo', sans-serif;
    letter-spacing: .01em;
    transition: all .25s;
    box-shadow: 0 0 35px var(--primary-glow);
    position: relative; overflow: hidden;
  }
  .start-btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.18), transparent);
    opacity: 0; transition: opacity .2s;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 0 55px var(--primary-glow); }
  .start-btn:hover::after { opacity: 1; }
  .start-btn:active { transform: translateY(0); }
  .start-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

  .lang-row {
    display: flex; align-items: center; justify-content: center; gap: .5rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }
  .lang-chip {
    padding: .3rem .65rem; border-radius: 8px; font-size: .75rem; font-weight: 600;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-sub); cursor: pointer; transition: all .18s;
  }
  .lang-chip.active { background: var(--primary-tint); border-color: rgba(99,102,241,.4); color: #a5b4fc; }
  .lang-chip:hover:not(.active) { background: var(--surface3); color: var(--text); }

  /* ═══════════════════════════════════════════════
     CHAT SCREEN
  ═══════════════════════════════════════════════ */
  #chatScreen { background: var(--bg); }

  /* ── HEADER ── */
  .chat-header {
    display: flex; align-items: center; gap: .85rem;
    padding: .8rem 1rem;
    padding-top: calc(.8rem + var(--safe-top));
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative; z-index: 20;
    /* dynamic primary color via JS */
    box-shadow: 0 1px 0 var(--border), 0 4px 20px rgba(0,0,0,.3);
  }
  .chat-header-avatar {
    width: 42px; height: 42px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(135deg, var(--primary), #a855f7);
    border: 2px solid rgba(255,255,255,.15);
    position: relative;
  }
  .chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .chat-header-avatar .av-online {
    position: absolute; bottom: 0; right: 0;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--green); border: 2px solid var(--surface);
  }
  .chat-header-info { flex: 1; min-width: 0; }
  .chat-header-name {
    font-weight: 700; font-size: .97rem; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chat-header-status {
    font-size: .73rem; color: var(--green);
    display: flex; align-items: center; gap: .3rem; margin-top: .1rem;
  }
  .chat-header-status.typing-status { color: var(--text-sub); }
  .chat-header-status::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
  }

  .header-lang-btn {
    background: rgba(255,255,255,.07); border: 1px solid var(--border2);
    color: var(--text-sub); border-radius: 8px; padding: .3rem .5rem;
    font-size: .72rem; cursor: pointer; outline: none; font-family: 'Cairo', sans-serif;
    transition: all .15s;
  }
  .header-lang-btn:hover { background: rgba(255,255,255,.12); color: var(--text); }

  /* ── STATUS BANNER ── */
  .status-banner {
    margin: .75rem 1rem; padding: .7rem 1rem; border-radius: 12px;
    font-size: .83rem; font-weight: 600; display: none;
    align-items: center; gap: .6rem; text-align: right;
  }
  .status-banner.active { display: flex; }
  .status-banner.error {
    background: var(--red-dim); border: 1px solid rgba(239,68,68,.25); color: #fca5a5;
  }
  .status-banner.info {
    background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.25); color: #a5b4fc;
  }

  /* ── MESSAGES AREA ── */
  .messages-area {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 1rem 1rem .5rem;
    display: flex; flex-direction: column; gap: .35rem;
    scroll-behavior: smooth;
    background:
      radial-gradient(ellipse 100% 40% at 50% 100%, rgba(99,102,241,.05) 0%, transparent 70%),
      var(--bg);
    /* Subtle dot pattern */
    background-image:
      radial-gradient(ellipse 100% 40% at 50% 100%, rgba(99,102,241,.05) 0%, transparent 70%),
      radial-gradient(rgba(255,255,255,.015) 1px, transparent 1px);
    background-size: 100% 100%, 28px 28px;
  }
  .messages-area::-webkit-scrollbar { width: 3px; }
  .messages-area::-webkit-scrollbar-track { background: transparent; }
  .messages-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 2px; }

  /* ── DATE DIVIDER ── */
  .date-divider {
    display: flex; align-items: center; gap: .75rem;
    font-size: .7rem; color: var(--text-muted); margin: .5rem 0;
    letter-spacing: .04em;
  }
  .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── GREETING CARD ── */
  .greeting-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px; padding: 1rem 1.25rem;
    text-align: center; font-size: .875rem; color: var(--text-sub);
    line-height: 1.65; margin-bottom: .5rem;
    box-shadow: 0 4px 20px rgba(0,0,0,.2);
  }
  .greeting-card .store-name-em {
    color: var(--primary); font-weight: 700;
  }

  /* ── MESSAGE BUBBLES ── */
  .msg-group { display: flex; flex-direction: column; gap: .15rem; }
  .msg-group + .msg-group { margin-top: .5rem; }

  .msg-row { display: flex; align-items: flex-end; gap: .45rem; }
  .msg-row.bot  { justify-content: flex-start; }
  .msg-row.user { justify-content: flex-end; }

  .msg-avatar-sm {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; font-weight: 700; overflow: hidden;
    background: linear-gradient(135deg, var(--primary), #a855f7);
    color: #fff;
    align-self: flex-end;
  }
  .msg-avatar-sm img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .msg-row.user .msg-avatar-sm { background: var(--surface3); color: var(--text-sub); }

  /* Avatar spacer for grouped messages */
  .msg-avatar-placeholder { width: 26px; flex-shrink: 0; }

  .bubble-wrap { display: flex; flex-direction: column; max-width: 74%; }
  .msg-row.user .bubble-wrap { align-items: flex-end; }
  .msg-row.bot  .bubble-wrap { align-items: flex-start; }

  .bubble {
    padding: .6rem .95rem .45rem;
    border-radius: var(--radius-bubble);
    font-size: .91rem; line-height: 1.6;
    word-break: break-word; white-space: pre-wrap;
    position: relative;
    animation: bubbleIn .22s cubic-bezier(.34,1.3,.64,1) both;
  }
  @keyframes bubbleIn {
    from { opacity: 0; transform: scale(.88) translateY(6px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .bubble.bot {
    background: var(--surface2);
    color: var(--text);
    border-bottom-right-radius: 6px;
    border-bottom-left-radius: var(--radius-bubble);
  }
  /* RTL: bot messages come from the right visually */
  [dir="rtl"] .bubble.bot {
    border-bottom-left-radius: 6px;
    border-bottom-right-radius: var(--radius-bubble);
  }

  .bubble.user {
    background: var(--primary);
    color: #fff;
    border-bottom-left-radius: 6px;
    border-bottom-right-radius: var(--radius-bubble);
  }
  [dir="rtl"] .bubble.user {
    border-bottom-right-radius: 6px;
    border-bottom-left-radius: var(--radius-bubble);
  }

  /* First/last in group radius adjustments */
  .bubble.first-in-group.bot  { border-top-right-radius: var(--radius-bubble); }
  .bubble.first-in-group.user { border-top-left-radius: var(--radius-bubble); }
  .bubble.last-in-group.bot   { border-bottom-right-radius: 6px; }
  .bubble.last-in-group.user  { border-bottom-left-radius: 6px; }

  .bubble-meta {
    display: flex; align-items: center; gap: .35rem;
    font-size: .62rem; margin-top: .25rem; opacity: .55;
  }
  .msg-row.user .bubble-meta { justify-content: flex-end; }
  .msg-row.bot  .bubble-meta { justify-content: flex-start; }
  .tick { font-size: .65rem; color: #93c5fd; }

  /* ── TYPING INDICATOR ── */
  .typing-row {
    display: flex; align-items: flex-end; gap: .45rem;
    animation: bubbleIn .22s ease both;
  }
  .typing-bubble {
    background: var(--surface2); border-radius: var(--radius-bubble);
    border-bottom-right-radius: 6px;
    padding: .7rem 1rem;
    display: flex; gap: 5px; align-items: center;
  }
  [dir="rtl"] .typing-bubble {
    border-bottom-right-radius: var(--radius-bubble);
    border-bottom-left-radius: 6px;
  }
  .t-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-muted);
    animation: typingBounce 1.3s ease-in-out infinite;
  }
  .t-dot:nth-child(2) { animation-delay: .2s; }
  .t-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: .4; }
    30%           { transform: translateY(-5px); opacity: 1; }
  }

  /* ── INPUT AREA ── */
  .input-area {
    padding: .65rem 1rem;
    padding-bottom: calc(.65rem + var(--safe-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: flex-end; gap: .6rem;
    flex-shrink: 0;
    box-shadow: 0 -4px 20px rgba(0,0,0,.2);
  }
  .msg-input {
    flex: 1; padding: .75rem 1.1rem;
    border-radius: 22px; outline: none; resize: none;
    background: var(--surface3);
    border: 1.5px solid transparent;
    color: var(--text); font-size: .91rem; font-family: 'Cairo', sans-serif;
    line-height: 1.5; max-height: 130px; overflow-y: auto;
    transition: border-color .2s, background .2s;
    text-align: right;
    caret-color: var(--primary);
  }
  .msg-input::placeholder { color: var(--text-muted); }
  .msg-input:focus {
    border-color: var(--primary);
    background: rgba(255,255,255,.05);
  }
  .msg-input:disabled { opacity: .4; cursor: not-allowed; }

  .send-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer; flex-shrink: 0;
    background: linear-gradient(135deg, var(--primary), #a855f7);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; box-shadow: 0 4px 20px var(--primary-glow);
    flex-direction: column;
  }
  .send-btn svg { width: 20px; height: 20px; }
  .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 28px var(--primary-glow); }
  .send-btn:active { transform: scale(.96); }
  .send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── SCROLL TO BOTTOM BTN ── */
  .scroll-btn {
    position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 999px; padding: .35rem 1rem; font-size: .78rem;
    color: var(--text-sub); cursor: pointer; display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
    transition: all .2s; z-index: 10; white-space: nowrap;
  }
  .scroll-btn:hover { background: var(--surface3); color: var(--text); }

  /* ── RTL INPUT ── */
  [dir="ltr"] .msg-input { text-align: left; }
  [dir="ltr"] .w-input   { text-align: left; }

  /* ── MOBILE ── */
  @media (max-width: 430px) {
    .bubble { font-size: .875rem; }
    .bubble-wrap { max-width: 82%; }
    .welcome-card { border-radius: 20px; padding: 2rem 1.5rem; }
  }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════
  LOADING SCREEN
════════════════════════════════════════════ -->
<div class="screen active" id="loadingScreen">
  <div class="loader-logo" id="loaderLogo">⚡</div>
  <div class="loader-dots">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════
  ERROR SCREEN
════════════════════════════════════════════ -->
<div class="screen" id="errorScreen">
  <div style="margin-bottom:1.25rem;" class="error-emoji">😕</div>
  <h2 style="font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:.6rem;" id="errorTitle">رابط غير صالح</h2>
  <p style="font-size:.9rem;color:var(--text-sub);max-width:300px;line-height:1.65;" id="errorMsg">هذا الرابط غير صحيح أو تم حذف المتجر.</p>
</div>

<!-- ════════════════════════════════════════════
  WELCOME SCREEN
════════════════════════════════════════════ -->
<div class="screen" id="welcomeScreen">
  <div class="welcome-card">

    <!-- Avatar -->
    <div class="welcome-avatar-wrap">
      <div class="welcome-avatar" id="welcomeAvatar">⚡</div>
      <div class="online-badge"></div>
    </div>

    <!-- Store info -->
    <h1 class="welcome-name" id="welcomeName">جاري التحميل...</h1>
    <p class="welcome-bio" id="welcomeBio"></p>
    <div class="online-label">متصل · جاهز للرد</div>

    <!-- Divider -->
    <div class="w-divider">ابدأ المحادثة</div>

    <!-- Name input -->
    <input
      class="w-input"
      type="text"

/* ── SWITCH UI LANGUAGE ───────────────────────────────── */
function switchUILang(lang) {
  if (!UI[lang]) lang = 'ar';
  uiLang = lang;
  localStorage.setItem('bchat_lang', lang);

  const c = UI[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir  = c.dir;

  // Sync all lang selectors
  document.querySelectorAll('[data-lang]').forEach(el => {
    el.classList.toggle('active', el.dataset.lang === lang);
  });
  const chatSel = document.getElementById('chatLangSelect');
  if (chatSel) chatSel.value = lang;

  // Update placeholders & labels
  const ni = document.getElementById('customerNameInput');
  if (ni) ni.placeholder = c.nameHint;
  const mi = document.getElementById('msgInput');
  if (mi) mi.placeholder = c.placeholder;
  const sb = document.getElementById('startBtn');
  if (sb && !sb.disabled) sb.textContent = c.startBtn;
  const dd = document.getElementById('dateDivider');
  if (dd) dd.textContent = c.divider;
  const scrollB = document.getElementById('scrollBtn');
  if (scrollB) scrollB.textContent = c.scrollBtn;

  // Update header status
  const st = document.getElementById('chatHeaderStatus');
  if (st && !st.classList.contains('typing-status')) st.textContent = c.online;

  // Update input dir
  if (mi) mi.dir = (lang === 'ar') ? 'rtl' : 'ltr';
  if (mi) mi.style.textAlign = (lang === 'ar') ? 'right' : 'left';
}

/* ── INIT ─────────────────────────────────────────────── */

  const savedLang = localStorage.getItem('bchat_lang') || 'ar';

  const params = new URLSearchParams(window.location.search);
  const mid    = params.get('id');

  if (!mid) {
    showError(UI[uiLang].errorTitle, UI[uiLang].errorMsg);
    return;
  }

  await loadMerchant(mid);
});

/* ── LOAD MERCHANT ────────────────────────────────────── */
async function loadMerchant(mid) {
  const { data, error } = await sb
    .from('profiles')
    .select('id,store_name,bot_name,logo_url,bio,products_info,custom_prompt,theme_color,sub_end_date,message_balance')
    .eq('id', mid)
    .single();

  if (error || !data) {
    showError(UI[uiLang].errorTitle, UI[uiLang].errorMsg);
    return;
  }

  merchant = data;

  // ── Apply dynamic theme color ──
  const hex = merchant.theme_color || '#6366f1';
  applyThemeColor(hex);

  // ── Page title ──
  document.title = `${merchant.store_name} · Chat`;

  // ── Populate welcome screen ──
  populateWelcome();

  showScreen('welcomeScreen');
}

/* ── APPLY THEME COLOR ────────────────────────────────── */
function applyThemeColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  const glow  = `rgba(${r},${g},${b},.35)`;
  const tint  = `rgba(${r},${g},${b},.12)`;
  const tint2 = `rgba(${r},${g},${b},.06)`;

  const root = document.documentElement.style;
  root.setProperty('--primary',       hex);
  root.setProperty('--primary-dark',  shadeHex(hex, -20));
  root.setProperty('--primary-glow',  glow);
  root.setProperty('--primary-tint',  tint);
  root.setProperty('--primary-tint2', tint2);

  // Header left border accent
  const header = document.getElementById('chatHeader');
  if (header) header.style.borderTop = `3px solid ${hex}`;
}

function shadeHex(hex, amt) {
  let r = Math.min(255, Math.max(0, parseInt(hex.slice(1,3),16) + amt));
  let g = Math.min(255, Math.max(0, parseInt(hex.slice(3,5),16) + amt));
  let b = Math.min(255, Math.max(0, parseInt(hex.slice(5,7),16) + amt));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

/* ── START CHAT ───────────────────────────────────────── */
async function startChat() {
  const btn = document.getElementById('startBtn');
  btn.textContent = '...'; btn.disabled = true;

                 || (uiLang === 'ar' ? 'زبون' : uiLang === 'fr' ? 'Client' : 'Customer');

  const av = document.getElementById('chatHeaderAvatar');
  if (merchant.logo_url) {
    document.getElementById('chatHeaderAvatarText').style.display = 'none';

  }
  document.getElementById('chatHeaderName').textContent = merchant.bot_name || merchant.store_name;

  isBotActive = checkBotActive();
  if (!isBotActive) {
    const now = new Date();

      ? UI[uiLang].expired
      : UI[uiLang].noBalance;

    document.getElementById('sendBtn').disabled  = true;

    ar: `مرحباً بك في <span class="store-name-em">${escHtml(merchant.store_name)}</span> 👋<br/>أنا <strong>${escHtml(merchant.bot_name || 'مساعد المتجر')}</strong>، كيف يمكنني مساعدتك اليوم؟`,
    fr: `Bienvenue chez <span class="store-name-em">${escHtml(merchant.store_name)}</span> 👋<br/>Je suis <strong>${escHtml(merchant.bot_name || 'votre assistant')}</strong>, comment puis-je vous aider ?`,
    en: `Welcome to <span class="store-name-em">${escHtml(merchant.store_name)}</span> 👋<br/>I'm <strong>${escHtml(merchant.bot_name || 'your assistant')}</strong>, how can I help you today?`,
    es: `Bienvenido/a a <span class="store-name-em">${escHtml(merchant.store_name)}</span> 👋<br/>Soy <strong>${escHtml(merchant.bot_name || 'tu asistente')}</strong>, ¿cómo puedo ayudarte?`,
    de: `Willkommen bei <span class="store-name-em">${escHtml(merchant.store_name)}</span> 👋<br/>Ich bin <strong>${escHtml(merchant.bot_name || 'dein Assistent')}</strong>, wie kann ich helfen?`,
  };
  document.getElementById('greetingCard').innerHTML = greetings[uiLang] || greetings['ar'];

  // ── Create DB conversation ──
  await createConversation();

  showScreen('chatScreen');
  btn.textContent = UI[uiLang].startBtn;
  btn.disabled    = false;

  scrollBottom();
  if (isBotActive) setTimeout(() => document.getElementById('msgInput').focus(), 300);
}

/* ── CHECK BOT ACTIVE ─────────────────────────────────── */
function checkBotActive() {
  return new Date(merchant.sub_end_date) > new Date() && (merchant.message_balance || 0) > 0;
}

/* ── CREATE CONVERSATION ─────────────────────────────── */
async function createConversation() {
  const { data, error } = await sb.from('conversations').insert({
    merchant_id:   merchant.id,
    customer_data: { name: customerName, lang: uiLang, started_at: new Date().toISOString() },
    chat_history:  [],
  }).select('id').single();
  if (!error && data) convId = data.id;
}

/* ── SEND MESSAGE ─────────────────────────────────────── */
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || isTyping || !isBotActive) return;

  input.value = '';
  autoResize(input);

  // Render user bubble immediately for snappy UX
  appendBubble('user', text);
  chatHistory.push({ role: 'user', content: text });

  setTyping(true);

  // ── 1. Call Groq ───────────────────────────────────────
  const reply = await callGroq();

  setTyping(false);

  // ── 2. Render bot reply ────────────────────────────────
  appendBubble('bot', reply);
  chatHistory.push({ role: 'assistant', content: reply });

  // ── 3. Decrement balance via secure Supabase RPC ──────────
  //    The SQL function `decrement_message_balance` runs server-side:
  //    UPDATE profiles SET message_balance = message_balance - 1
  //    WHERE id = m_id AND message_balance > 0;
  //    This prevents race conditions and negative balances.
  const { error: rpcErr } = await sb.rpc('decrement_message_balance', {
    m_id: merchant.id,
  });

  if (rpcErr) {
    // RPC failed (network, permissions, etc.) — log and use local fallback
    console.error('[B-Chat] decrement_message_balance RPC failed:', rpcErr.message);
    merchant.message_balance = Math.max(0, (merchant.message_balance || 1) - 1);
  } else {
    // Re-fetch the real balance from DB — this is the source of truth
    const { data: freshProfile, error: fetchErr } = await sb
      .from('profiles')
      .select('message_balance')
      .eq('id', merchant.id)
      .single();

    if (fetchErr) {
      console.error('[B-Chat] Balance re-fetch failed:', fetchErr.message);
      merchant.message_balance = Math.max(0, (merchant.message_balance || 1) - 1);
    } else {
      merchant.message_balance = freshProfile.message_balance ?? 0;
    }
  }

  // ── 4. Save conversation history (fire-and-forget is fine here) ──
  if (convId) {
    sb.from('conversations')
      .update({
        chat_history:  chatHistory,
        customer_data: {
          name:        customerName,
          lang:        uiLang,
          last_active: new Date().toISOString(),
        },
      })
      .eq('id', convId)
      .then(({ error }) => {
        if (error) console.error('[B-Chat] Conversation save failed:', error.message);
      });
  }

  // ── 5. Lock chat if balance is now zero ────────────────
  if (merchant.message_balance <= 0) {
    isBotActive = false;
    // Show exact required Arabic stop message
    showBanner('⚠️ انتهى الرصيد، يرجى تعبئة الحساب', 'error');
    const msgInput = document.getElementById('msgInput');
    const sendBtn  = document.getElementById('sendBtn');
    msgInput.disabled     = true;
    msgInput.placeholder  = '';
    sendBtn.disabled      = true;
    console.info('[B-Chat] Balance reached 0 — chat locked.');
  }

  scrollBottom();
  if (isBotActive) input.focus();
}

/* ── CALL GROQ ────────────────────────────────────────── */
async function callGroq() {
  const sysPrompt = buildSystemPrompt();

  // Send last 24 messages for context (12 user + 12 bot)
  const messages = [
    { role: 'system', content: sysPrompt },
    ...chatHistory.slice(-24),
  ];

  try {
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${BCHAT_CONFIG.GROQ_API_KEY}`,
      },
      body: JSON.stringify({
        model:       BCHAT_CONFIG.GROQ_MODEL,
        max_tokens:  600,
        temperature: 0.75,
        messages,
      }),
    });

    if (!resp.ok) {
      console.error('Groq HTTP error:', resp.status, await resp.text().catch(()=>''));
      return UI[uiLang].errApi;
    }

    const data = await resp.json();
    const raw  = data.choices?.[0]?.message?.content || '';
    return cleanAIOutput(raw) || UI[uiLang].errApi;

  } catch (err) {
    console.error('Groq fetch error:', err);
    return UI[uiLang].errNet;
  }
}

/* ── CLEAN AI OUTPUT ──────────────────────────────────── */
/**
 * Strips all <think>...</think> blocks (DeepSeek / reasoning models).
 * Also cleans <thinking>, <reflection>, and similar internal tags.
 * Trims extra whitespace and blank lines.
 */
function cleanAIOutput(raw) {
  if (!raw) return '';
  let clean = raw
    // Remove <think>...</think> (multiline, greedy off)
    .replace(/<think[\s\S]*?<\/think>/gi, '')
    // Remove <thinking>...</thinking>
    .replace(/<thinking[\s\S]*?<\/thinking>/gi, '')
    // Remove <reflection>...</reflection>
    .replace(/<reflection[\s\S]*?<\/reflection>/gi, '')
    // Remove <reasoning>...</reasoning>
    .replace(/<reasoning[\s\S]*?<\/reasoning>/gi, '')
    // Remove any leftover orphan opening/closing think tags
    .replace(/<\/?think[^>]*>/gi, '')
    // Collapse 3+ blank lines → 1 blank line
    .replace(/\n{3,}/g, '\n\n')
    // Trim
    .trim();
  return clean;
}

/* ── BUILD SYSTEM PROMPT ──────────────────────────────── */
function buildSystemPrompt() {
  const langInstructions = {
    ar: `تحدث بالدارجة المغربية (خليط طبيعي من العربية والفرنسية المغربية). إذا تكلم الزبون بلغة أخرى، جاوبه بنفس لغته.`,
    fr: `Réponds en français. Si le client parle une autre langue, adapte-toi.`,
    en: `Reply in English. Adapt to the customer's language if they switch.`,
    es: `Responde en español. Adáptate al idioma del cliente.`,
    de: `Antworte auf Deutsch. Passe dich der Sprache des Kunden an.`,
  };

  const parts = [
    `أنت ${escHtml(merchant.bot_name || 'مساعد مبيعات')} ديال متجر "${escHtml(merchant.store_name)}".`,
    ``,
    `## دورك`,
    `- أجب على أسئلة الزبائن بخصوص المنتجات والأسعار والتوصيل`,
    `- اقنع الزبون بالشراء — أنت sales closer محترف`,
    `- اطلب رقم الهاتف لتأكيد الطلب في نهاية المحادثة`,
    ``,
    `## اللغة`,
    langInstructions[uiLang] || langInstructions['ar'],
    ``,
    `## قواعد صارمة`,
    `- لا تقل أبداً أنك AI أو Groq أو نموذج لغوي — أنت مساعد المتجر فقط`,
    `- ردودك قصيرة ومركزة (2-3 جمل عادةً)`,
    `- لا تخترع معلومات — إذا ما عندكش جواب قل "غادي نسول وخبرك"`,
    `- استعمل emojis باعتدال 🛍️`,
    `- لا تُظهر أي تفكير داخلي أو تحليل — فقط الرد النهائي`,
    `- اسم الزبون: ${escHtml(customerName)}`,
  ];

  if (merchant.bio) {
    parts.push(`\n## المتجر\n${merchant.bio}`);
  }

  if (merchant.products_info) {
    parts.push(`\n## المنتجات والمعلومات\n${merchant.products_info}`);
  } else {
    parts.push(`\n## ملاحظة: صاحب المتجر لم يضف معلومات المنتجات بعد. اطلب منه أن يتصل بك على الواتساب لمعرفة التفاصيل.`);
  }

  if (merchant.custom_prompt) {
    parts.push(`\n## تعليمات إضافية من صاحب المتجر\n${merchant.custom_prompt}`);
  }

  return parts.join('\n');
}

/* ── TYPING STATE ─────────────────────────────────────── */
let typingEl = null;

function setTyping(state) {
  isTyping = state;
  document.getElementById('sendBtn').disabled = state;

  const statusEl = document.getElementById('chatHeaderStatus');

  if (state) {
    // Show typing indicator in messages
    const area = document.getElementById('messagesArea');
    typingEl = document.createElement('div');
    typingEl.className = 'typing-row';
    typingEl.id = 'typingIndicator';

    const av = createAvatarEl('bot');
    const tb = document.createElement('div');
    tb.className = 'typing-bubble';
    tb.innerHTML = '<div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>';

    typingEl.appendChild(av);
    typingEl.appendChild(tb);
    area.appendChild(typingEl);

    // Header status → typing
    statusEl.textContent = UI[uiLang].typing;
    statusEl.classList.add('typing-status');

    scrollBottom();
  } else {
    // Remove typing indicator
    const existing = document.getElementById('typingIndicator');
    if (existing) existing.remove();
    typingEl = null;

    // Restore header status
    statusEl.textContent = UI[uiLang].online;
    statusEl.classList.remove('typing-status');
  }
}

/* ── APPEND BUBBLE ────────────────────────────────────── */
function appendBubble(role, text) {
  const area = document.getElementById('messagesArea');

  const row = document.createElement('div');
  row.className = `msg-group`;

  const msgRow = document.createElement('div');
  msgRow.className = `msg-row ${role}`;

  const av = createAvatarEl(role);

  const wrapDiv = document.createElement('div');
  wrapDiv.className = 'bubble-wrap';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role} first-in-group last-in-group`;

  // Safely render text (escape HTML, convert newlines to <br>)
  bubble.innerHTML = escHtml(text).replace(/\n/g, '<br/>');

  // Meta row (time + tick)
  const meta = document.createElement('div');
  meta.className = 'bubble-meta';
  const now = new Date();
  const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  meta.innerHTML = `<span>${timeStr}</span>${role === 'user' ? '<span class="tick">✓✓</span>' : ''}`;

  wrapDiv.appendChild(bubble);
  wrapDiv.appendChild(meta);

  if (role === 'bot') {
    msgRow.appendChild(av);
    msgRow.appendChild(wrapDiv);
  } else {
    msgRow.appendChild(wrapDiv);
    msgRow.appendChild(av);
  }

  row.appendChild(msgRow);
  area.appendChild(row);

  if (atBottom) scrollBottom();
  else showScrollBtn();
}

/* ── CREATE AVATAR ELEMENT ────────────────────────────── */
function createAvatarEl(role) {
  const av = document.createElement('div');
  av.className = 'msg-avatar-sm';
  if (role === 'bot') {
    if (merchant.logo_url) {
      av.innerHTML = `<img src="${escHtml(merchant.logo_url)}" alt="" />`;
    } else {
      av.textContent = (merchant.bot_name || 'B')[0].toUpperCase();
    }
    av.style.background = `linear-gradient(135deg, ${merchant.theme_color || '#6366f1'}, #a855f7)`;
  } else {
    av.textContent = customerName[0]?.toUpperCase() || 'Z';
    av.style.background = 'var(--surface3)';
    av.style.color = 'var(--text-sub)';
  }
  return av;
}

/* ── SCROLL HELPERS ───────────────────────────────────── */
function scrollBottom() {
  const area = document.getElementById('messagesArea');
  requestAnimationFrame(() => {
    area.scrollTop = area.scrollHeight;
    atBottom = true;
    document.getElementById('scrollBtn').style.display = 'none';
  });
}

function handleScroll() {
  const area = document.getElementById('messagesArea');
  atBottom = area.scrollHeight - area.clientHeight - area.scrollTop < 60;
  if (atBottom) document.getElementById('scrollBtn').style.display = 'none';
}

function showScrollBtn() {
  document.getElementById('scrollBtn').style.display = 'block';
}

/* ── STATUS BANNER ────────────────────────────────────── */
function showBanner(msg, type = 'info') {
  const el = document.getElementById('statusBanner');
  el.textContent = msg;
  el.className = `status-banner active ${type}`;
}

/* ── SCREEN MANAGER ───────────────────────────────────── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showError(title, msg) {
  document.getElementById('errorTitle').textContent = title || UI[uiLang].errorTitle;
  document.getElementById('errorMsg').textContent   = msg   || UI[uiLang].errorMsg;
  showScreen('errorScreen');
}

/* ── INPUT HELPERS ────────────────────────────────────── */
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

function handleKeyDown(e) {
  // Send on Enter (not Shift+Enter)
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

/* ── UTILS ────────────────────────────────────────────── */
function escHtml(str) {
  return (str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ── MOBILE: prevent layout shift on virtual keyboard ── */
window.visualViewport?.addEventListener('resize', () => {
  if (document.getElementById('chatScreen').classList.contains('active')) {
    scrollBottom();
  }
});
</script>
